  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

lo\" style=\"font-size:14px; font-weight:500; color:rgba(244,244,239,0.66);\" style-hover=\"color:#f4f4ef;\">Currículo<\u002Fa>\n        <a href=\"#investimento\" style=\"font-size:14px; font-weight:500; color:rgba(244,244,239,0.66);\" style-hover=\"color:#f4f4ef;\">Investimento<\u002Fa>\n        <a href=\"{{ applyUrl }}\" style=\"background:#9bc8b5; color:#12160f; font-weight:700; font-size:14px; padding:11px 20px; border-radius:2px; white-space:nowrap;\" style-hover=\"background:#b6ddca; color:#12160f;\">Inscrever-se<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main id=\"top\">\n\n    <!-- ================= HERO ================= -->\n    <section data-screen-label=\"Hero\" style=\"position:relative; padding:clamp(52px,7vw,96px) clamp(20px,6vw,80px) clamp(72px,9vw,124px); overflow:hidden; scroll-margin-top:78px;\">\n      <div style=\"position:absolute; right:-7%; top:-6%; width:min(54vw,660px); height:min(54vw,660px); -webkit-mask:url(&quot;884b54b4-8ba7-477e-b288-123d8dd7ad29&quot;) center/contain no-repeat; mask:url(&quot;884b54b4-8ba7-477e-b288-123d8dd7ad29&quot;) center/contain no-repeat; background:#9bc8b5; opacity:0.055; pointer-events:none;\"><\u002Fdiv>\n      <div style=\"max-width:1180px; margin:0 auto; position:relative; display:grid; grid-template-columns:repeat(auto-fit,minmax(332px,1fr)); gap:clamp(38px,5vw,74px); align-items:center;\">\n        <div data-reveal=\"\">\n          \n          <h1 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(38px,5.9vw,72px); line-height:1.02; letter-spacing:-.017em; margin:22px 0 0; color:#f4f4ef;\">Uma jornada pela <span style=\"color:#9bc8b5;\">vida do Rei<\u002Fspan> para formar um povo do Reino.<\u002Fh1>\n          <p style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(16px,1.55vw,19px); line-height:1.66; color:rgba(244,244,239,0.7); margin:26px 0 0; max-width:46ch;\">Um curso de formação bíblica e espiritual da Igreja Vida para redescobrir a mensagem central da pregação de Jesus — o evangelho do Reino — e aprender a vivê-la em cada área da vida.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:14px; margin-top:36px;\">\n            <a href=\"{{ applyUrl }}\" style=\"display:inline-flex; align-items:center; gap:10px; background:#9bc8b5; color:#12160f; font-weight:700; font-size:15px; padding:16px 30px; border-radius:2px;\" style-hover=\"background:#b6ddca; color:#12160f;\">Inscrever-se →<\u002Fa>\n            <a href=\"#jornada\" style=\"display:inline-flex; align-items:center; border:1px solid rgba(244,244,239,0.26); color:#f4f4ef; font-weight:600; font-size:15px; padding:16px 26px; border-radius:2px;\" style-hover=\"border-color:#f4f4ef; background:rgba(244,244,239,0.05);\">Conhecer a jornada<\u002Fa>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:11px 24px; margin-top:40px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showHeroPhoto }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-reveal=\"\" style=\"position:relative;\">\n            <div style=\"position:absolute; top:-9px; left:-9px; width:18px; height:18px; border-top:1px solid #9bc8b5; border-left:1px solid #9bc8b5; opacity:0.7;\"><\u002Fdiv>\n            <div style=\"position:absolute; bottom:-9px; right:-9px; width:18px; height:18px; border-bottom:1px solid #9bc8b5; border-right:1px solid #9bc8b5; opacity:0.7;\"><\u002Fdiv>\n            <div style=\"position:relative; aspect-ratio:4/5; border:1px solid rgba(244,244,239,0.12); filter:grayscale(1) contrast(1.04); border-radius:3px; overflow:hidden;\">\n              <image-slot id=\"hero-photo\" shape=\"rect\" placeholder=\"Arraste uma foto da comunidade (P&amp;B)\"><\u002Fimage-slot>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= O QUE É (green band) ================= -->\n    <section data-screen-label=\"O curso\" style=\"background:#9bc8b5; color:#1c1c1c; padding:clamp(72px,9vw,124px) clamp(20px,6vw,80px);\">\n      <div style=\"max-width:1000px; margin:0 auto;\" data-reveal=\"\">\n        <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#1c1c1c;\">\n          <span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>\n          O curso\n        <\u002Fdiv>\n        <p style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(23px,3.3vw,40px); line-height:1.3; letter-spacing:-.01em; color:#1c1c1c; margin:22px 0 0;\">O Vida Missional é um programa criado para capacitar os membros da Igreja Vida com fundamentos teológicos, permitindo que vivam em missão no seu dia a dia — um guia encorajador e prático que convida o cristão a enxergar a própria rotina através de novas lentes.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= A VIRADA ================= -->\n    <section data-screen-label=\"O evangelho do Reino\" style=\"padding:clamp(72px,9vw,132px) clamp(20px,6vw,80px); position:relative;\">\n      <div style=\"max-width:1040px; margin:0 auto;\">\n        <div data-reveal=\"\">\n          <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#9bc8b5;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>O evangelho do Reino<\u002Fdiv>\n          <h2 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(30px,4.4vw,54px); line-height:1.05; letter-spacing:-.012em; color:#f4f4ef; margin:20px 0 0;\">O evangelho é maior do que aprendemos.<\u002Fh2>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:clamp(24px,3vw,48px); margin-top:38px;\">\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.72; color:rgba(244,244,239,0.68);\">Ao longo da história, muitos passaram a compreender o evangelho apenas como um caminho para o céu — uma religião ou um conjunto de doutrinas e práticas individuais. Mas os Evangelhos apresentam algo muito maior.<\u002Fp>\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.72; color:rgba(244,244,239,0.68);\">O chamado de Jesus não era para que pessoas mudassem de religião, mas para que se rendessem ao verdadeiro Rei e participassem da renovação que Deus está realizando em toda a criação. É essa visão que conduz todo o curso.<\u002Fp>\n        <\u002Fdiv>\n        <blockquote data-reveal=\"\" style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(26px,3.9vw,46px); line-height:1.18; letter-spacing:-.01em; color:#f4f4ef; border-left:2px solid #9bc8b5; padding-left:clamp(20px,2.6vw,34px); margin:clamp(44px,5vw,68px) 0 0; max-width:22ch;\">Jesus inicia seu ministério anunciando que <span style=\"color:#9bc8b5;\">o Reino de Deus chegou.<\u002Fspan><\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= MANIFESTO ================= -->\n    <section data-screen-label=\"Manifesto\" style=\"padding:clamp(72px,9vw,132px) clamp(20px,6vw,80px); border-top:1px solid rgba(244,244,239,0.08); border-bottom:1px solid rgba(244,244,239,0.08); position:relative;\">\n      <div style=\"max-width:1040px; margin:0 auto;\">\n        <div data-reveal=\"\" style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#9bc8b5;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>Manifesto<\u002Fdiv>\n        <p data-reveal=\"\" style=\"font-family:'Jost',sans-serif; font-weight:300; font-size:clamp(27px,4.2vw,50px); line-height:1.16; letter-spacing:-.012em; color:#f4f4ef; margin:22px 0 0;\">Jesus não veio fundar uma nova religião; Ele veio inaugurar o <span style=\"color:#9bc8b5;\">Reino de Deus<\u002Fspan> e formar um povo que participe da <span style=\"color:#9bc8b5;\">missão de Deus<\u002Fspan> na restauração de todas as coisas.<\u002Fp>\n        <p data-reveal=\"\" style=\"font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:rgba(244,244,239,0.5); margin:20px 0 0;\">— Pedro Lione<\u002Fp>\n        <div data-reveal=\"\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:clamp(24px,3vw,48px); margin-top:clamp(36px,4vw,54px);\">\n          <div style=\"display:flex; flex-direction:column; gap:20px;\">\n            <p style=\"font-size:clamp(15px,1.5vw,17px); line-height:1.74; color:rgba(244,244,239,0.68);\">Durante muito tempo, medimos nosso amor a Deus pela quantidade de eventos que preenchiam a agenda. Aprendemos a separar a vida em duas caixas: o que fazemos para o Reino e o que fazemos para sobreviver. Mas o culto acontece, de forma real, na vida cotidiana.<\u002Fp>\n            <p style=\"font-size:clamp(15px,1.5vw,17px); line-height:1.74; color:rgba(244,244,239,0.68);\">Cristo não é um detalhe do nosso culto: é o fundamento e a finalidade. Assim como o próprio Deus encarnou, caminhou em nossas ruas, sentou-se em nossas mesas e redimiu a humanidade, nós somos chamados a segui-Lo na vida comum.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:20px;\">\n            <p style=\"font-size:clamp(15px,1.5vw,17px); line-height:1.74; color:rgba(244,244,239,0.68);\">A missão é um convite a ser vivido — e não um fardo. Esse convite não exige que você cruze oceanos, mude de profissão ou encontre a mítica “25ª hora” do dia.<\u002Fp>\n            <p style=\"font-size:clamp(15px,1.5vw,17px); line-height:1.74; color:rgba(244,244,239,0.68);\">O Criador já está em movimento. Ele está nas planilhas do escritório, no trânsito das seis da tarde, na sala de aula e na mesa de jantar da sua casa. <span style=\"color:#f4f4ef;\">O lugar onde você já está é o seu campo missionário. O tempo que você já tem é o cenário do milagre.<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        \n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= AS DUAS ETAPAS ================= -->\n    <section id=\"jornada\" data-screen-label=\"A jornada\" style=\"padding:clamp(72px,9vw,132px) clamp(20px,6vw,80px); scroll-margin-top:78px; position:relative;\">\n      <div style=\"max-width:1180px; margin:0 auto;\">\n        <div data-reveal=\"\" style=\"max-width:720px;\">\n          <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#9bc8b5;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>A jornada<\u002Fdiv>\n          <h2 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(30px,4.4vw,54px); line-height:1.05; letter-spacing:-.012em; color:#f4f4ef; margin:20px 0 0;\">Duas etapas, uma só história.<\u002Fh2>\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.66; color:rgba(244,244,239,0.66); margin:20px 0 0;\">Criação, redenção, missão, Igreja e nova criação fazem parte de uma única narrativa: a história do Reino de Deus.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:clamp(18px,2.2vw,28px); margin-top:clamp(40px,4.5vw,60px);\">\n          <div data-reveal=\"\" style=\"background:#161616; border:1px solid rgba(244,244,239,0.09); border-radius:4px; padding:clamp(30px,3.4vw,46px); display:flex; flex-direction:column;\">\n            <div style=\"display:flex; align-items:baseline; gap:14px;\">\n              <span style=\"font-family:'Jost',sans-serif; font-weight:300; font-size:clamp(34px,4vw,52px); line-height:1; color:#9bc8b5;\">01<\u002Fspan>\n              <span style=\"font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:rgba(244,244,239,0.45);\">Etapa<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(24px,2.7vw,32px); color:#f4f4ef; margin:18px 0 0;\">A Vida do Rei<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.72; color:rgba(244,244,239,0.66); margin:16px 0 0;\">Contemplamos a grande narrativa das Escrituras até sua plenitude em Jesus Cristo. Todas as promessas de Deus encontram cumprimento no Rei prometido — cujo ministério, cruz, ressurreição, ascensão e envio do Espírito inauguram a chegada do Reino. Em Cristo, Deus derrota o pecado e o mal, inaugura a nova criação e chama um novo povo para Sua missão.<\u002Fp>\n          <\u002Fdiv>\n          <div data-reveal=\"\" style=\"background:#161616; border:1px solid rgba(244,244,239,0.09); border-radius:4px; padding:clamp(30px,3.4vw,46px); display:flex; flex-direction:column;\">\n            <div style=\"display:flex; align-items:baseline; gap:14px;\">\n              <span style=\"font-family:'Jost',sans-serif; font-weight:300; font-size:clamp(34px,4vw,52px); line-height:1; color:#9bc8b5;\">02<\u002Fspan>\n              <span style=\"font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:rgba(244,244,239,0.45);\">Etapa<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(24px,2.7vw,32px); color:#f4f4ef; margin:18px 0 0;\">A Vida no Reino<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.72; color:rgba(244,244,239,0.66); margin:16px 0 0;\">Refletimos sobre o que significa viver como cidadãos desse Reino enquanto aguardamos sua consumação. Redescobrimos a vida no Espírito, as disciplinas espirituais, o casamento, a comunidade cristã, a vocação da Igreja em uma cultura de exílio e a esperança da criação restaurada. A missão passa a ser o próprio modo de viver do povo de Deus no mundo.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= ÁREAS DA VIDA ================= -->\n    <section data-screen-label=\"Áreas da vida\" style=\"padding:clamp(72px,9vw,132px) clamp(20px,6vw,80px); position:relative;\">\n      <div style=\"max-width:1180px; margin:0 auto;\">\n        <div data-reveal=\"\" style=\"max-width:720px;\">\n          <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#9bc8b5;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>O senhorio de Jesus<\u002Fdiv>\n          <h2 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(30px,4.4vw,54px); line-height:1.05; letter-spacing:-.012em; color:#f4f4ef; margin:20px 0 0;\">O Reino em cada área da vida.<\u002Fh2>\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.66; color:rgba(244,244,239,0.66); margin:20px 0 0;\">Família, trabalho, igreja, cidade e cultura — todos os espaços onde o senhorio de Jesus pode ser testemunhado.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(272px,1fr)); gap:1px; background:rgba(244,244,239,0.09); border:1px solid rgba(244,244,239,0.09); border-radius:4px; overflow:hidden; margin-top:clamp(38px,4.4vw,56px);\">\n          <sc-for list=\"{{ areas }}\" as=\"a\" hint-placeholder-count=\"6\">\n            <div style=\"background:#121212; padding:clamp(26px,2.6vw,38px); min-height:210px; display:flex; flex-direction:column; gap:14px;\">\n              <div style=\"display:flex; align-items:center; gap:12px;\">\n                <span style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:14px; letter-spacing:.08em; color:#9bc8b5;\">{{ a.k }}<\u002Fspan>\n                <span style=\"flex:1; height:1px; background:rgba(244,244,239,0.12);\"><\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(20px,2.2vw,26px); color:#f4f4ef;\">{{ a.t }}<\u002Fh3>\n              <p style=\"font-size:14.5px; line-height:1.66; color:rgba(244,244,239,0.6);\">{{ a.d }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= AULA MAGNA ================= -->\n    <section data-screen-label=\"Aula Magna\" style=\"padding:clamp(56px,7vw,104px) clamp(20px,6vw,80px); position:relative;\">\n      <div style=\"max-width:1180px; margin:0 auto;\">\n        <div data-reveal=\"\" style=\"border:1px solid rgba(155,200,181,0.34); border-radius:4px; padding:clamp(30px,4vw,60px); background:#131513; position:relative; overflow:hidden;\">\n          <div style=\"position:absolute; right:-4%; top:-30%; width:min(30vw,300px); height:min(30vw,300px); -webkit-mask:url(&quot;884b54b4-8ba7-477e-b288-123d8dd7ad29&quot;) center/contain no-repeat; mask:url(&quot;884b54b4-8ba7-477e-b288-123d8dd7ad29&quot;) center/contain no-repeat; background:#9bc8b5; opacity:0.06; pointer-events:none;\"><\u002Fdiv>\n          <div style=\"position:relative; display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:clamp(28px,3.5vw,56px); align-items:center;\">\n            <div>\n              <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:#ec5c1c;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>Aula Magna de abertura<\u002Fdiv>\n              <h3 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(28px,3.6vw,44px); line-height:1.08; color:#f4f4ef; margin:18px 0 0;\">Dr. Michael W. Goheen<\u002Fh3>\n              <p styl 2px 0 0;\" style-hover=\"background:#b6ddca; color:#12160f;\">Inscrever-se →<\u002Fa>\n          <p style=\"font-size:12.5px; color:rgba(244,244,239,0.45); margin:16px 0 0;\">Turma inaugural limitada a membros convidados<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= FAQ ================= -->\n    <section data-screen-label=\"FAQ\" style=\"padding:clamp(72px,9vw,132px) clamp(20px,6vw,80px); border-top:1px solid rgba(244,244,239,0.08); position:relative;\">\n      <div style=\"max-width:820px; margin:0 auto;\">\n        <div data-reveal=\"\">\n          <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#9bc8b5;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>Perguntas frequentes<\u002Fdiv>\n          <h2 style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(28px,4vw,48px); line-height:1.05; letter-spacing:-.012em; color:#f4f4ef; margin:20px 0 0;\">Ainda com dúvidas?<\u002Fh2>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"margin-top:clamp(32px,3.6vw,48px); border-top:1px solid rgba(244,244,239,0.1);\">\n          <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <div style=\"border-bottom:1px solid rgba(244,244,239,0.1);\">\n              <button onclick=\"{{ f.toggle }}\" style=\"width:100%; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:18px; padding:22px 0; text-align:left; font-family:'Plus Jakarta Sans',sans-serif;\">\n                <span style=\"font-size:clamp(16px,1.7vw,19px); font-weight:500; color:#f4f4ef;\">{{ f.q }}<\u002Fspan>\n                <span style=\"font-family:'Jost',sans-serif; font-weight:300; font-size:26px; color:#9bc8b5; line-height:1; flex:none;\">{{ f.sign }}<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:15px; line-height:1.7; color:rgba(244,244,239,0.64); padding:0 40px 24px 0; margin:0;\">{{ f.a }}<\u002Fp>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ================= CTA FINAL ================= -->\n    <section data-screen-label=\"Chamado\" style=\"padding:clamp(84px,11vw,160px) clamp(20px,6vw,80px); text-align:center; position:relative; overflow:hidden; border-top:1px solid rgba(244,244,239,0.08);\">\n      <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(70vw,720px); height:min(70vw,720px); -webkit-mask:url(&quot;884b54b4-8ba7-477e-b288-123d8dd7ad29&quot;) center/contain no-repeat; mask:url(&quot;884b54b4-8ba7-477e-b288-123d8dd7ad29&quot;) center/contain no-repeat; background:#9bc8b5; opacity:0.045; pointer-events:none;\"><\u002Fdiv>\n      <div style=\"max-width:840px; margin:0 auto; position:relative;\" data-reveal=\"\">\n        <div style=\"display:inline-flex; align-items:center; gap:10px; font-size:12.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:#ec5c1c;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>O chamado<\u002Fdiv>\n        <h2 style=\"font-family:'Jost',sans-serif; font-weight:300; font-size:clamp(32px,5.2vw,66px); line-height:1.04; letter-spacing:-.015em; color:#f4f4ef; margin:22px 0 0;\">O lugar onde você já está é o seu <span style=\"color:#9bc8b5;\">campo missionário.<\u002Fspan><\u002Fh2>\n        <p style=\"font-family:'Jost',sans-serif; font-weight:400; font-size:clamp(18px,2.2vw,26px); color:rgba(244,244,239,0.7); margin:24px 0 0;\">Bem-vindo ao Vida Missional.<\u002Fp>\n        <div style=\"display:flex; justify-content:center; margin-top:40px;\">\n          <a href=\"{{ applyUrl }}\" style=\"display:inline-flex; align-items:center; gap:10px; background:#9bc8b5; color:#12160f; font-weight:700; font-size:16px; padding:18px 38px; border-radius:2px;\" style-hover=\"background:#b6ddca; color:#12160f;\">Inscrever-se →<\u002Fa>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:rgba(244,244,239,0.5); margin:26px 0 0; letter-spacing:.03em;\">Turma 2026 · Início 10 de agosto · Vagas limitadas<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid rgba(244,244,239,0.08); padding:clamp(40px,5vw,64px) clamp(20px,6vw,80px);\">\n    <div style=\"max-width:1180px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <img src=\"fb28059d-2bc2-466b-828b-f2d8d9e9062e\" alt=\"Vida Missional\" style=\"height:24px; width:auto;\">\n        <span style=\"font-size:12.5px; color:rgba(244,244,239,0.42); letter-spacing:.03em;\">Igreja Vida · Formação Vida Missional 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:22px; flex-wrap:wrap;\">\n        <a href=\"#jornada\" style=\"font-size:13px; color:rgba(244,244,239,0.55);\" style-hover=\"color:#f4f4ef;\">A jornada<\u002Fa>\n        <a href=\"#curriculo\" style=\"font-size:13px; color:rgba(244,244,239,0.55);\" style-hover=\"color:#f4f4ef;\">Currículo<\u002Fa>\n        <a href=\"#investimento\" style=\"font-size:13px; color:rgba(244,244,239,0.55);\" style-hover=\"color:#f4f4ef;\">Investimento<\u002Fa>\n        <a href=\"{{ applyUrl }}\" style=\"font-size:13px; color:#9bc8b5;\" style-hover=\"color:#f4f4ef;\">Inscrever-se<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <div id=\"vm-sticky-cta\" style=\"position:fixed; left:0; right:0; bottom:0; z-index:60; display:none; background:rgba(16,16,16,0.9); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-top:1px solid rgba(244,244,239,0.1);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:12px clamp(18px,5vw,40px); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;\">\n      <span style=\"font-size:13.5px; color:rgba(244,244,239,0.72); display:inline-flex; align-items:center; gap:9px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#ec5c1c; display:inline-block;\"><\u002Fspan>Vida Missional 2026 · vagas limitadas<\u002Fspan>\n      <a href=\"{{ applyUrl }}\" style=\"background:#9bc8b5; color:#12160f; font-weight:700; font-size:14px; padding:11px 22px; border-radius:2px; flex:none;\" style-hover=\"background:#b6ddca; color:#12160f;\">Inscrever-se →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;applicationUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Candidatura.dc.html&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Comportamento&quot; },\n  &quot;heroTreatment&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;photo&quot;, &quot;minimal&quot;], &quot;default&quot;: &quot;photo&quot;, &quot;tsType&quot;: &quot;'photo' | 'minimal'&quot;, &quot;section&quot;: &quot;Layout&quot; },\n  &quot;scrollReveal&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot; },\n  &quot;stickyCta&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Comportamento&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n\n  renderVals() {\n    const applyUrl = this.props.applicationUrl ?? 'Candidatura.dc.html';\n    const showHeroPhoto = (this.props.heroTreatment ?? 'photo') === 'photo';\n\n    const areas = [\n      { k: '01', t: 'Família', d: 'A mesa de jantar como altar. O casamento e o lar como os primeiros lugares de discipulado e testemunho do Reino.' },\n      { k: '02', t: 'Trabalho', d: 'As planilhas do escritório e a rotina profissional reconhecidas como campo missionário e adoração a Deus.' },\n      { k: '03', t: 'Igreja', d: 'Uma comunidade que vive a missão junta — não um evento na agenda, mas um modo de vida partilhado.' },\n      { k: '04', t: 'Cidade', d: 'O trânsito das seis da tarde, a vizinhança e a cidade como o lugar onde você já foi enviado.' },\n      { k: '05', t: 'Cultura', d: 'Viver com fidelidade numa cultura de exílio — testemunhar o Rei sem se conformar ao mundo.' },\n      { k: '06', t: 'Criação', d: 'A esperança da nova criação: participar da restauração de todas as coisas que Deus está realizando.' },\n    ];\n\n    const modulo1 = [\n      { n: '01', t: 'A promessa do Rei', tag: 'Presencial', date: '20 ago' },\n      { n: '02', t: 'O evangelho do Reino', tag: 'Online', date: '27 ago' },\n      { n: '03', t: 'O ministério do Rei', tag: 'Presencial', date: '03 set' },\n      { n: '04', t: 'A cruz do Rei', tag: 'Online', date: '10 set' },\n      { n: '05', t: 'A ressurreição do Rei', tag: 'Presencial', date: '17 set' },\n      { n: '06', t: 'A ascensão e o Espírito do Rei', tag: 'Gravada', date: '24 set' },\n    ];\n\n    const modulo2 = [\n      { n: '07', t: 'Vida no Espírito', tag: 'Presencial', date: '01 out' },\n      { n: '08', t: 'Disciplinas do Reino', tag: 'Gravada', date: '08 out' },\n      { n: '09', t: 'Casamento do Reino', tag: 'Presencial', date: '22 out' },\n      { n: '10', t: 'A comunidade do Reino', tag: 'Presencial', date: '29 out' },\n      { n: '11', t: 'Vida no exílio', tag: 'Online', date: '05 nov' },\n      { n: '12', t: 'O Reino na criação restaurada', tag: 'Presencial', date: '12 nov' },\n    ];\n\n    const faqData = [\n      { q: 'Preciso ser membro da Igreja Vida?', a: 'Sim. O Vida Missional é oferecido a membros selecionados por indicação e convite, como parte da formação da nossa comunidade.' },\n      { q: 'Como funciona o formato híbrido?', a: 'São 12 encontros semanais, às segundas, 19h30 — combinando encontros presenciais na Igreja Vida, aulas ao vivo online e algumas aulas gravadas.' },\n      { q: 'Quando começa e termina?', a: 'A jornada abre com a Aula Magna em 10 de agosto de 2026 e segue até 12 de novembro.' },\n      { q: 'Preciso ter formação teológica?', a: 'Não. O curso é encorajador e prático — pensado para qualquer membro que deseje viver o Reino no dia a dia.' },\n      { q: 'Qual é o investimento?', a: 'R$ 70 por toda a jornada, incluindo a Aula Magna com o Dr. Michael Goheen e o material do curso.' },\n      { q: 'E se eu perder um encontro?', a: 'Algumas aulas são gravadas e ficam disponíveis, mas a presença nos encontros é parte essencial da experiência.' },\n    ];\n\n    const faqs = faqData.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      open: i === this.state.openFaq,\n      sign: i === this.state.openFaq ? '\\u2212' : '+',\n      toggle: () => this.setState((s) => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n\n    return { applyUrl, showHeroPhoto, areas, modulo1, modulo2, faqs };\n  }\n\n  componentDidMount() {\n    if (this.props.scrollReveal !== false && typeof IntersectionObserver !== 'undefined') {\n      const els = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));\n      const io = new IntersectionObserver((ents) => {\n        ents.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n      const vh = window.innerHeight || 800;\n      els.forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.9) return;\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(22px)';\n        el.style.transition = 'opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1)';\n        io.observe(el);\n      });\n    }\n\n    if (this.props.stickyCta !== false) {\n      const bar = document.getElementById('vm-sticky-cta');\n      if (bar) {\n        const onScroll = () => {\n          bar.style.display = window.scrollY > (window.innerHeight * 0.9) ? 'block' : 'none';\n        };\n        window.addEventListener('scroll', onScroll, { passive: true });\n        onScroll();\n        this._onScroll = onScroll;\n      }\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
